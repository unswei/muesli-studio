name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  studio-and-packages:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: generate protocol types
        run: pnpm gen:types

      - name: ensure generated files are committed
        run: git diff --exit-code

      - name: validate fixtures against schema
        run: pnpm check:fixtures

      - name: lint
        run: pnpm lint

      - name: test
        run: pnpm test

      - name: build studio
        run: pnpm build

  inspector-build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configure inspector
        run: cmake --preset default -S apps/inspector

      - name: build inspector
        run: cmake --build apps/inspector/build --config Release

      - name: smoke test inspector
        run: apps/inspector/build/mbt_inspector --ws :8877 --demo-ticks 2 --tick-ms 10 --log apps/inspector/build/ci-smoke.jsonl --quiet

      - name: assert inspector emitted canonical events
        run: |
          test -s apps/inspector/build/ci-smoke.jsonl
          grep -n '"type":"run_start"' apps/inspector/build/ci-smoke.jsonl
          grep -n '"type":"bt_def"' apps/inspector/build/ci-smoke.jsonl
