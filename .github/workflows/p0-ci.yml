name: p0-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: generate protocol types
        run: pnpm gen:types

      - name: ensure generated files are committed
        run: git diff --exit-code

      - name: validate fixtures against schema
        run: pnpm check:fixtures

      - name: lint
        run: pnpm lint

      - name: test
        run: pnpm test

      - name: build studio
        run: pnpm build
