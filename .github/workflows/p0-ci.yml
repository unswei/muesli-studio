name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  studio-and-packages:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: configure inspector
        run: pnpm inspector:configure

      - name: sync schema from muesli-bt
        run: pnpm sync:schema

      - name: ensure schema sync is committed
        run: git diff --exit-code -- schema/mbt.evt.v1.schema.json

      - name: sync contract from muesli-bt
        run: pnpm sync:contract

      - name: ensure contract sync is committed
        run: git diff --exit-code -- contracts/muesli-studio-integration.md

      - name: generate protocol types
        run: pnpm gen:types

      - name: ensure generated files are committed
        run: git diff --exit-code

      - name: validate fixtures against schema
        run: pnpm check:fixtures

      - name: lint
        run: pnpm lint

      - name: test
        run: pnpm test

      - name: build studio
        run: pnpm build

  inspector-build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: configure inspector
        run: cmake --preset default -S apps/inspector

      - name: build inspector
        run: cmake --build apps/inspector/build --config Release

      - name: smoke test inspector
        run: apps/inspector/build/mbt_inspector --attach mock --ws :8877 --run-loop '{"max_ticks":2}' --tick-hz 100 --seed 7 --log apps/inspector/build/ci-smoke.jsonl --quiet

      - name: assert inspector emitted canonical events
        run: |
          test -s apps/inspector/build/ci-smoke.jsonl
          grep -n '"type":"run_start"' apps/inspector/build/ci-smoke.jsonl
          grep -n '"type":"bt_def"' apps/inspector/build/ci-smoke.jsonl

      - name: verify WS/JSONL equivalence
        run: pnpm inspector:test

  inspector-build-webots:
    if: github.event_name != 'schedule'
    runs-on: macos-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: install webots SDK
        run: brew install --cask webots

      - name: resolve Webots home
        run: |
          webots_app="/Applications/Webots.app"
          if [[ ! -d "${webots_app}/Contents/lib/controller" ]]; then
            cask_prefix="$(brew --prefix --cask webots)"
            webots_app="$(find "${cask_prefix}/Caskroom/webots" -maxdepth 4 -type d -name Webots.app | head -n 1)"
          fi
          test -n "${webots_app}"
          test -d "${webots_app}/Contents/lib/controller"
          echo "WEBOTS_HOME=${webots_app}/Contents" >> "${GITHUB_ENV}"

      - name: configure inspector
        run: cmake --preset default -S apps/inspector

      - name: build inspector
        run: cmake --build apps/inspector/build --config Release

      - name: smoke test inspector with Webots attach
        run: apps/inspector/build/mbt_inspector --attach webots --ws :8878 --run-loop '{"max_ticks":2}' --tick-hz 100 --seed 7 --log apps/inspector/build/ci-smoke-webots.jsonl --quiet

      - name: assert inspector emitted canonical events for Webots
        run: |
          test -s apps/inspector/build/ci-smoke-webots.jsonl
          grep -n '"type":"run_start"' apps/inspector/build/ci-smoke-webots.jsonl
          grep -n '"type":"bt_def"' apps/inspector/build/ci-smoke-webots.jsonl

      - name: verify WS/JSONL equivalence for Webots
        run: pnpm inspector:test --attach webots --ticks 3 --tick-hz 100 --timeout-ms 8000

  inspector-build-main:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: configure inspector against muesli-bt main
        run: cmake --preset default -S apps/inspector -DMUESLI_BT_GIT_TAG=main

      - name: build inspector
        run: cmake --build apps/inspector/build --config Release

      - name: verify WS/JSONL equivalence
        run: pnpm inspector:test
